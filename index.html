<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEON OVERDRIVE</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; user-select: none; }
        #ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; background: radial-gradient(circle, #1a0020, #000); }
        #hud { display: none; position: absolute; top: 20px; left: 20px; color: #0ff; pointer-events: none; }
        button { padding: 20px 50px; background: transparent; color: #0ff; border: 2px solid #0ff; font-size: 24px; cursor: pointer; }
        button:hover { background: #0ff; color: #000; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <h1>NEON OVERDRIVE</h1>
        <button id="start-btn">INITIALIZE SYSTEM</button>
    </div>

    <div id="hud">
        <div id="hp-display">HEALTH: 100%</div>
        <div id="score-display">SCORE: 0000</div>
    </div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
    import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/PointerLockControls.js';

    // 1. PROJECTILE CLASS
    class Projectile {
        constructor(scene, origin, direction) {
            this.mesh = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
            this.mesh.position.copy(origin);
            this.velocity = direction.multiplyScalar(2);
            this.life = 100;
            scene.add(this.mesh);
        }
        update() { this.mesh.position.add(this.velocity); this.life--; }
    }

    // 2. BOSS CLASS
    class PhantomBoss {
        constructor(scene) {
            this.mesh = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 2), new THREE.MeshBasicMaterial({ color: 0xff00ff, wireframe: true }));
            this.mesh.position.set(10, 2, -10);
            scene.add(this.mesh);
        }
        update(playerPos) {
            this.mesh.visible = Math.random() > 0.1;
            this.mesh.position.lerp(playerPos, 0.002);
            this.mesh.lookAt(playerPos);
        }
    }

    // 3. CORE ENGINE
    class NeonEngine {
        constructor() {
            this.scene = new THREE.Scene();
            this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            this.renderer = new THREE.WebGLRenderer({ antialias: true });
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(this.renderer.domElement);

            this.controls = new PointerLockControls(this.camera, document.body);
            this.bullets = [];
            this.phantom = new PhantomBoss(this.scene);
            this.state = { hp: 100, running: false };

            this.setupEvents();
            this.animate();
        }

        setupEvents() {
            // Fix: Button just requests lock
            document.getElementById('start-btn').addEventListener('click', () => {
                document.body.requestPointerLock();
            });

            // Fix: Game logic only starts when browser confirms the lock
            document.addEventListener('pointerlockchange', () => {
                if (document.pointerLockElement === document.body) {
                    document.getElementById('ui-overlay').style.display = 'none';
                    document.getElementById('hud').style.display = 'block';
                    this.state.running = true;
                } else {
                    document.getElementById('ui-overlay').style.display = 'flex';
                    this.state.running = false;
                }
            });

            window.addEventListener('mousedown', () => {
                if(this.state.running) {
                    const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(this.camera.quaternion);
                    this.bullets.push(new Projectile(this.scene, this.camera.position, dir));
                }
            });
        }

        animate() {
            requestAnimationFrame(() => this.animate());
            if (this.state.running) {
                this.phantom.update(this.camera.position);
                this.bullets.forEach((b, i) => {
                    b.update();
                    if(b.life <= 0) { this.scene.remove(b.mesh); this.bullets.splice(i, 1); }
                });
            }
            this.renderer.render(this.scene, this.camera);
        }
    }

    new NeonEngine();
</script>
</body>
</html>
