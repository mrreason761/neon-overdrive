<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Overdrive</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; user-select: none; }
        
        /* Advanced CRT Overlay */
        body::after { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 100; background-size: 100% 4px, 6px 100%; pointer-events: none; }

        /* UI Base */
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; }
        .hud-panel { position: absolute; padding: 15px 25px; background: rgba(0, 5, 10, 0.7); border: 1px solid rgba(0, 255, 255, 0.3); color: #0ff; box-shadow: 0 0 10px rgba(0,255,255,0.2); font-weight: bold; text-transform: uppercase; letter-spacing: 2px; backdrop-filter: blur(4px); }
        
        #health-panel { bottom: 30px; left: 30px; font-size: 24px; border-left: 4px solid #f0f; color: #f0f; box-shadow: -5px 0 15px rgba(255,0,255,0.5); }
        #ammo-panel { bottom: 30px; right: 30px; font-size: 32px; text-align: right; border-right: 4px solid #0ff; box-shadow: 5px 0 15px rgba(0,255,255,0.5); }
        #score-panel { top: 30px; left: 30px; font-size: 20px; border-left: 4px solid #ff0; color: #ff0; }
        #weapon-panel { bottom: 90px; right: 30px; font-size: 18px; color: #fff; border-right: 4px solid #fff; opacity: 0.8; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: #0ff; box-shadow: 0 0 12px #0ff; transform: translate(-50%, -50%); border-radius: 50%; transition: 0.1s; }
        #hitmarker { position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; transform: translate(-50%, -50%) rotate(45deg); border: 2px solid transparent; transition: border-color 0.1s; }

        .menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(10,0,20,0.95) 0%, rgba(0,0,0,0.98) 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 20; text-align: center; }
        h1 { font-size: 72px; margin-bottom: 10px; color: #0ff; text-shadow: 0 0 30px #0ff, 4px 0px #f0f, -4px 0px #0ff; text-transform: uppercase; font-style: italic; }
        p { font-size: 18px; color: #aaa; margin-bottom: 40px; letter-spacing: 1px; line-height: 1.5; }
        button { padding: 15px 50px; font-size: 24px; font-family: inherit; font-weight: bold; background: rgba(0,255,255,0.1); color: #0ff; border: 2px solid #0ff; cursor: pointer; transition: 0.2s; box-shadow: inset 0 0 15px rgba(0,255,255,0.2), 0 0 20px rgba(0,255,255,0.2); text-transform: uppercase; }
        button:hover { background: #0ff; color: #000; box-shadow: inset 0 0 0 transparent, 0 0 40px #0ff; letter-spacing: 2px; }
        
        #game-over { display: none; }
        .red-glitch { color: #f00; text-shadow: 0 0 30px #f00, 5px 0px #0ff, -5px 0px #f00; border-color: #f00; box-shadow: inset 0 0 15px rgba(255,0,0,0.2), 0 0 20px rgba(255,0,0,0.2); }
        .red-glitch:hover { background: #f00; color: #000; box-shadow: inset 0 0 0 transparent, 0 0 40px #f00; }
    </style>
</head>
<body>

    <div id="start-menu" class="menu">
        <h1 id="menu-title">NEON OVERDRIVE V2</h1>
        <p>WASD: Move | SHIFT: Sprint | SPACE: Jump<br>L-CLICK: Shoot | R-CLICK: ADS | SCROLL: Switch Weapon<br>R: Reload | ESC: Pause</p>
        <button id="start-btn">INITIALIZE</button>
    </div>

    <div id="game-over" class="menu">
        <h1 class="red-glitch">SYSTEM TERMINATED</h1>
        <p id="final-score" style="color: #fff; font-size: 24px;">Score: 0</p>
        <button id="restart-btn" class="red-glitch">REBOOT</button>
    </div>

    <div id="hud">
        <div id="crosshair"></div>
        <div id="hitmarker"></div>
        <div id="score-panel" class="hud-panel">SCORE: <span id="score-val">0</span></div>
        <div id="health-panel" class="hud-panel">SYS.HP: <span id="hp-val">100</span>%</div>
        <div id="weapon-panel" class="hud-panel"><span id="weapon-name">ASSAULT RIFLE</span></div>
        <div id="ammo-panel" class="hud-panel"><span id="ammo-val">30</span>/<span id="ammo-max">30</span></div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/PointerLockControls.js';
        import { EffectComposer } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/postprocessing/EffectComposer.js';
        import { RenderPass } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/postprocessing/UnrealBloomPass.js';

        // Projectile trajectory visualization helps players understand spread mechanics.
        // 
        
        window.oncontextmenu = (e) => e.preventDefault();

        class AudioEngine {
            constructor() { this.ctx = null; }
            init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if(this.ctx.state === 'suspended') this.ctx.resume(); }
            play(type) {
                if(!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination);
                const now = this.ctx.currentTime;
                if (type === 'ar') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(180, now); osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.1);
                    gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now); osc.stop(now + 0.1);
                } else if (type === 'shotgun') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(100, now); osc.frequency.exponentialRampToValueAtTime(10, now + 0.3);
                    gain.gain.setValueAtTime(0.4, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now); osc.stop(now + 0.3);
                } else if (type === 'hit') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(40, now);
                    gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now); osc.stop(now + 0.2);
                }
            }
        }
        const audio = new AudioEngine();

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020205, 0.025);
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene); composer.addPass(bloomPass);

        const mapSize = 200;
        const walls = [];

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(mapSize, mapSize), new THREE.MeshBasicMaterial({color: 0x020205}));
        floor.rotation.x = -Math.PI / 2; scene.add(floor);

        function createWall(x, z, w, d, h) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const mesh = new THREE.Mesh(geo, mat);
            const edges = new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({ color: 0x00aaff, linewidth: 2 }));
            mesh.add(edges);
            mesh.position.set(x, h/2, z);
            scene.add(mesh);
            const box = new THREE.Box3().setFromObject(mesh);
            walls.push(box);
            return mesh;
        }

        for(let i=0; i<40; i++) {
            const w = Math.random() * 10 + 5;
            const d = Math.random() * 10 + 5;
            const h = Math.random() * 20 + 5;
            let x = (Math.random()-0.5) * (mapSize - 20);
            let z = (Math.random()-0.5) * (mapSize - 20);
            if (Math.sqrt(x*x + z*z) > 15) createWall(x, z, w, d, h);
        }

        createWall(0, mapSize/2, mapSize, 1, 20); createWall(0, -mapSize/2, mapSize, 1, 20);
        createWall(mapSize/2, 0, 1, mapSize, 20); createWall(-mapSize/2, 0, 1, mapSize, 20);

        const particles = [];
        function spawnParticles(pos, color, count=10) {
            for(let i=0; i<count; i++) {
                const p = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), new THREE.MeshBasicMaterial({color: color}));
                p.position.copy(pos);
                p.velocity = new THREE.Vector3((Math.random()-0.5)*1.5, Math.random()*1.5, (Math.random()-0.5)*1.5);
                scene.add(p); particles.push({mesh: p, life: 1.0});
            }
        }

        class Weapon {
            constructor(name, fireRate, damage, ammo, spread, recoil, sound) {
                this.name = name; this.fireRate = fireRate; this.damage = damage; 
                this.maxAmmo = ammo; this.ammo = ammo; this.spread = spread;
                this.recoil = recoil; this.sound = sound;
                this.lastFire = 0; this.isReloading = false;
                this.mesh = new THREE.Group();
                const barrel = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.05, 0.8), new THREE.MeshBasicMaterial({color: 0x333333}));
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.15, 0.4), new THREE.MeshBasicMaterial({color: 0x111111}));
                body.position.set(0, -0.05, 0.2); this.mesh.add(barrel, body);
                this.hipPos = new THREE.Vector3(0.3, -0.25, -0.5);
                this.adsPos = new THREE.Vector3(0, -0.12, -0.4);
                this.mesh.position.copy(this.hipPos);
            }
            fire(time) {
                if (time - this.lastFire < this.fireRate || this.ammo <= 0 || this.isReloading) return false;
                this.ammo--; this.lastFire = time; audio.play(this.sound);
                this.mesh.rotation.x += this.recoil; this.mesh.position.z += 0.1;
                return true;
            }
        }

        const weapons = [ new Weapon("AR", 0.09, 1, 30, 0.01, 0.05, 'ar'), new Weapon("SHOTGUN", 0.8, 2, 8, 0.1, 0.15, 'shotgun') ];
        let currentWeapon = 0;
        camera.add(weapons[0].mesh); scene.add(camera);

        const state = { hp: 100, score: 0, isAlive: false, shake: 0, velY: 0, isGrounded: false };
        const controls = new PointerLockControls(camera, document.body);
        let bullets = [], enemies = [];
        const keys = { w: false, a: false, s: false, d: false, shift: false, space: false };
        let isADS = false, isFiring = false;

        class Enemy {
            constructor(x, z) {
                this.hp = 5;
                this.mesh = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2.2, 1.2), new THREE.MeshStandardMaterial({color: 0x000000, emissive: 0xff0055, emissiveIntensity: 2}));
