<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON OVERDRIVE</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        #ui { position: absolute; z-index: 10; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        button { padding: 20px 40px; font-size: 20px; border: 2px solid #0ff; background: transparent; color: #0ff; }
    </style>
</head>
<body>
    <div id="ui"><button id="start">INITIALIZE ENGINE</button></div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

    let scene, camera, renderer, bullets = [];
    const MAX_BULLETS = 50;

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- OBJECT POOLING (The Secret Sauce) ---
        const bGeo = new THREE.BoxGeometry(0.1, 0.1, 0.5);
        const bMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
        for(let i=0; i<MAX_BULLETS; i++) {
            let b = new THREE.Mesh(bGeo, bMat);
            b.visible = false;
            scene.add(b);
            bullets.push({ mesh: b, vel: new THREE.Vector3(), life: 0 });
        }

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        
        // Update pooled bullets
        bullets.forEach(b => {
            if(b.life > 0) {
                b.mesh.position.add(b.vel);
                b.life -= 0.01;
                if(b.life <= 0) b.mesh.visible = false;
            }
        });

        renderer.render(scene, camera);
    }

    document.getElementById('start').addEventListener('click', (e) => {
        document.getElementById('ui').style.display = 'none';
        init();
    });

    // Mobile touch handling
    window.addEventListener('touchstart', () => {
        // Fire bullet from pool
        let b = bullets.find(x => !x.mesh.visible);
        if(b) {
            b.mesh.position.copy(camera.position);
            b.mesh.visible = true;
            b.vel.set(0, 0, -1).applyQuaternion(camera.quaternion).multiplyScalar(0.5);
            b.life = 1;
        }
    });
</script>
</body>
</html>
